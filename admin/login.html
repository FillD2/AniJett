<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель AniJett — Вход</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" type="image/x-icon" href="../img/anj-favicon.png?v=10">
</head>
<body class="admin-login">
    <div class="admin-login-container">
        <div class="admin-login-card">
            <h1>AniJett <span>Админ</span></h1>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-input" id="email" placeholder="admin@anijett.local" value="admin@anijett.local">
                </div>
                <div class="form-group">
                    <label>Пароль</label>
                    <input type="password" class="form-input" id="password" placeholder="••••••••" value="password">
                </div>
                <button type="submit" class="btn-primary">Войти</button>
            </form>
            <p class="admin-hint">Демо-режим: нажмите «Войти» без проверки</p>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            // Имитация входа – просто сохраняем флаг в sessionStorage
            sessionStorage.setItem('admin_logged_in', 'true');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
