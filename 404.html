<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена | AniJett</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body class="error-page">
    <div class="error-container">
        <div class="error-content">
            <h1 class="error-code">404</h1>
            <h2 class="error-title">Страница не найдена</h2>
            <p class="error-message">Кажется, эта страница была удалена, перемещена или никогда не существовала.</p>
            <div class="error-actions">
                <a href="/" class="btn-primary"><i class="fas fa-home"></i> Вернуться на главную</a>
                <button class="btn-secondary" onclick="history.back()"><i class="fas fa-arrow-left"></i> Назад</button>
            </div>
            <div class="error-image">
                <i class="fas fa-film"></i>
            </div>
        </div>
    </div>
</body>
</html>
